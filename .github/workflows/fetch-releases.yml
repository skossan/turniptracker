name: Fetch Turnip Releases

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch releases from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          REPOS=(
            "K11MCH1/AdrenoToolsDrivers"
            "Weab-chan/freedreno_turnip-CI"
            "ilhan-athn7/freedreno_turnip-CI"
            "StevenMXZ/Adreno-Tools-Drivers"
            "whitebelyash/freedreno_turnip-CI"
            "nihui/mesa-turnip-android-driver"
            "MrPurple666/purple-turnip"
          )

          OUTPUT_FILE="releases.json"
          TEMP_DATA="[]"

          for REPO in "${REPOS[@]}"; do
            echo "Processing $REPO..."

            # 1. Fetch formal releases
            RELEASES=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO/releases?per_page=10")

            # 2. Check if releases are empty, if so, fetch tags
            if [ "$RELEASES" = "[]" ] || [ -z "$RELEASES" ]; then
              echo "   -> No formal releases found. Fetching tags fallback..."
              TAGS=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                "https://api.github.com/repos/$REPO/tags?per_page=10")
              
              # Map tags to a structure the tracker understands
              RELEASES=$(echo "$TAGS" | python3 -c "
import sys, json
try:
    tags = json.load(sys.stdin)
    out = []
    for t in tags[:10]:
        out.append({
            'tag_name': t['name'],
            'name': t['name'],
            'published_at': '2024-01-01T00:00:00Z',
            'html_url': f'https://github.com/$REPO/releases/tag/{t[\"name\"]}',
            'prerelease': True,
            'assets': []
        })
    print(json.dumps(out))
except:
    print('[]')
")
            fi

            # 3. Fetch repo metadata
            REPO_INFO=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/$REPO")

            STARS=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stargazers_count',0))" 2>/dev/null || echo 0)
            FORKS=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('forks_count',0))" 2>/dev/null || echo 0)
            DESC=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('description','') or '')" 2>/dev/null || echo "")

            # 4. Use Python to merge this repo into the main JSON array
            TEMP_DATA=$(python3 - <<PYEOF
import json

repo_name = "$REPO"
stars = $STARS
forks = $FORKS
desc = """$DESC"""
current_data = json.loads('''$TEMP_DATA''')
new_releases_raw = '''$RELEASES'''

try:
    releases = json.loads(new_releases_raw)
except:
    releases = []

processed_rels = []
for r in releases[:10]:
    assets = r.get("assets", [])
    total_dl = sum(a.get("download_count", 0) for a in assets)
    processed_rels.append({
        "id": r.get("id"),
        "tag_name": r.get("tag_name", ""),
        "name": r.get("name") or r.get("tag_name"),
        "published_at": r.get("published_at") or "2024-01-01T00:00:00Z",
        "html_url": r.get("html_url"),
        "prerelease": r.get("prerelease", False),
        "total_downloads": total_dl,
        "asset_count": len(assets)
    })

repo_obj = {
    "repo": repo_name,
    "stars": stars,
    "forks": forks,
    "description": desc,
    "fetched_at": "$(date -u +'%Y-%m-%dT%H:%M:%SZ')",
    "releases": processed_rels
}

current_data.append(repo_obj)
print(json.dumps(current_data))
PYEOF
)
          done

          echo "$TEMP_DATA" | python3 -c "import sys, json; print(json.dumps(json.load(sys.stdin), indent=2))" > $OUTPUT_FILE
          echo "Successfully generated releases.json"

      - name: Commit and push releases.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update releases data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
