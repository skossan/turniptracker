name: Fetch Turnip Releases

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch releases from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          REPOS=(
            "K11MCH1/AdrenoToolsDrivers"
            "Weab-chan/freedreno_turnip-CI"
            "s1mptom/freedreno_turnip-CI"
            "StevenMXZ/Adreno-Tools-Drivers"
            "whitebelyash/freedreno_turnip-CI"
            "nihui/mesa-turnip-android-driver"
            "MrPurple666/purple-turnip"
          )

          OUTPUT="[]"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          for REPO in "${REPOS[@]}"; do
            echo "Fetching data for $REPO..."

            # Fetch Repo Metadata
            REPO_INFO=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO")
            STARS=$(echo "$REPO_INFO" | jq '.stargazers_count // 0')
            FORKS=$(echo "$REPO_INFO" | jq '.forks_count // 0')
            DESC=$(echo "$REPO_INFO" | jq -r '.description // ""')

            # Fetch formal releases
            RELEASES=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/releases?per_page=10")

            # FALLBACK: If releases array is empty [], fetch tags
            if [ "$RELEASES" = "[]" ] || [ -z "$RELEASES" ]; then
              echo "   -> No releases found, fetching tags..."
              TAGS=$(curl -s -H "Authorization: Bearer $GH_TOKEN" "https://api.github.com/repos/$REPO/tags?per_page=10")
              
              # Map tags to look like releases so the HTML doesn't break
              RELEASES=$(echo "$TAGS" | jq -c --arg REPO "$REPO" 'map({
                tag_name: .name,
                name: .name,
                published_at: "2024-01-01T00:00:00Z",
                html_url: "https://github.com/\($REPO)/releases/tag/\(.name)",
                prerelease: true,
                assets: []
              })')
            fi

            # Process the releases/tags into the final format
            REPO_OBJ=$(echo "$RELEASES" | jq -c --arg REPO "$REPO" --arg STARS "$STARS" --arg FORKS "$FORKS" --arg DESC "$DESC" --arg TIME "$TIMESTAMP" '{
              repo: $REPO,
              stars: ($STARS | tonumber),
              forks: ($FORKS | tonumber),
              description: $DESC,
              fetched_at: $TIME,
              releases: map({
                id: .id,
                tag_name: .tag_name,
                name: (.name // .tag_name),
                published_at: (.published_at // "2024-01-01T00:00:00Z"),
                html_url: .html_url,
                prerelease: (.prerelease // false),
                total_downloads: ([.assets[].download_count] | add // 0),
                asset_count: (.assets | length // 0)
              })
            }')

            # Append to the main output array
            OUTPUT=$(echo "$OUTPUT" | jq -c ". + [$REPO_OBJ]")
          done

          # Save formatted JSON
          echo "$OUTPUT" | jq '.' > releases.json
          echo "Done. Saved releases.json"

      - name: Commit and push releases.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update releases data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
