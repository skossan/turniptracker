name: Fetch Turnip Releases

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch releases from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          REPOS=(
            "s1mptom/freedreno_turnip-CI"
            "StevenMXZ/Adreno-Tools-Drivers"
            "whitebelyash/AdrenoToolsDrivers"
            "nihui/mesa-turnip-android-driver"
            "MrPurple666/purple-turnip"
            "The412Banner/Banners-Turnip"
          )

          OUTPUT="[]"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          for REPO in "${REPOS[@]}"; do
            echo "Fetching data for $REPO..."

            # Fetch repo metadata
            REPO_INFO=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO")

            STARS=$(echo "$REPO_INFO" | jq '.stargazers_count // 0')
            FORKS=$(echo "$REPO_INFO" | jq '.forks_count // 0')
            DESC=$(echo "$REPO_INFO" | jq -r '.description // ""')

            # Fetch releases
            RELEASES=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/$REPO/releases?per_page=10")

            # Ensure response is an array
            if ! echo "$RELEASES" | jq -e 'type == "array"' >/dev/null 2>&1; then
              echo "ERROR: Invalid releases response for $REPO"
              echo "$RELEASES"
              continue
            fi

            # Fallback to tags if no releases exist
            if [ "$(echo "$RELEASES" | jq 'length')" -eq 0 ]; then
              echo "   -> No releases found, fetching tags..."

              TAGS=$(curl -s \
                -H "Authorization: Bearer $GH_TOKEN" \
                "https://api.github.com/repos/$REPO/tags?per_page=10")

              if ! echo "$TAGS" | jq -e 'type == "array"' >/dev/null 2>&1; then
                echo "ERROR: Invalid tags response for $REPO"
                echo "$TAGS"
                continue
              fi

              RELEASES=$(echo "$TAGS" | jq -c --arg REPO "$REPO" '
                map({
                  id: null,
                  tag_name: .name,
                  name: .name,
                  published_at: "2024-01-01T00:00:00Z",
                  html_url: "https://github.com/\($REPO)/releases/tag/\(.name)",
                  prerelease: true,
                  assets: []
                })
              ')
            fi

            echo "   -> Found $(echo "$RELEASES" | jq 'length') releases/tags"

            # Uncomment for debugging
            # echo "===== DEBUG $REPO ====="
            # echo "$RELEASES" | jq .

            REPO_OBJ=$(echo "$RELEASES" | jq -c \
              --arg REPO "$REPO" \
              --arg STARS "$STARS" \
              --arg FORKS "$FORKS" \
              --arg DESC "$DESC" \
              --arg TIME "$TIMESTAMP" '
            {
              repo: $REPO,
              stars: ($STARS | tonumber),
              forks: ($FORKS | tonumber),
              description: $DESC,
              fetched_at: $TIME,
              releases: map({
                id: (.id // null),
                tag_name: .tag_name,
                name: (.name // .tag_name),
                published_at: (.published_at // "2024-01-01T00:00:00Z"),
                html_url: .html_url,
                prerelease: (.prerelease // false),
                total_downloads: ([.assets[]?.download_count] | add // 0),
                asset_count: (.assets | length // 0),
                assets: ((.assets // []) | map({
                  name: .name,
                  size: .size,
                  download_count: .download_count,
                  browser_download_url: .browser_download_url
                }))
              })
            }')

            OUTPUT=$(echo "$OUTPUT" | jq -c --argjson repo "$REPO_OBJ" '. + [$repo]')
          done

          echo "$OUTPUT" | jq '.' > releases.json
          echo "Done. Saved releases.json"

      - name: Commit and push releases.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add releases.json

          git diff --cached --quiet && echo "No changes to commit" && exit 0

          git commit -m "chore: update releases data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
