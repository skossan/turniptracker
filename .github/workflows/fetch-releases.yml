name: Fetch Turnip Releases

on:
  schedule:
    # Runs every 6 hours
    - cron: '0 */6 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch releases from GitHub API
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          REPOS=(
            "K11MCH1/AdrenoToolsDrivers"
            "Weab-chan/freedreno_turnip-CI"
            "ilhan-athn7/freedreno_turnip-CI"
            "StevenMXZ/Adreno-Tools-Drivers"
            "whitebelyash/freedreno_turnip-CI"
            "nihui/mesa-turnip-android-driver"
            "MrPurple666/purple-turnip"
          )

          OUTPUT="["
          FIRST_REPO=true

          for REPO in "${REPOS[@]}"; do
            echo "Fetching releases for $REPO..."

            # Fetch up to 10 releases per repo
            RELEASES=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO/releases?per_page=10")

            # Fetch repo info (star count, watchers, etc.)
            REPO_INFO=$(curl -s \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$REPO")

            STARS=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('stargazers_count',0))" 2>/dev/null || echo 0)
            FORKS=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('forks_count',0))" 2>/dev/null || echo 0)
            DESC=$(echo "$REPO_INFO" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('description','') or '')" 2>/dev/null || echo "")

            # Build per-repo object using Python for safe JSON handling
            REPO_OBJ=$(python3 - <<PYEOF
          import json, sys

          repo = "$REPO"
          stars = $STARS
          forks = $FORKS
          desc = """$DESC"""

          raw = '''$RELEASES'''
          try:
              releases = json.loads(raw)
          except Exception:
              releases = []

          processed = []
          for r in releases[:10]:
              assets = r.get("assets", [])
              total_downloads = sum(a.get("download_count", 0) for a in assets)
              processed.append({
                  "id": r.get("id"),
                  "tag_name": r.get("tag_name", ""),
                  "name": r.get("name", "") or r.get("tag_name", ""),
                  "published_at": r.get("published_at", ""),
                  "html_url": r.get("html_url", ""),
                  "prerelease": r.get("prerelease", False),
                  "body": (r.get("body", "") or "")[:400],
                  "total_downloads": total_downloads,
                  "asset_count": len(assets),
                  "assets": [
                      {
                          "name": a.get("name", ""),
                          "download_count": a.get("download_count", 0),
                          "size": a.get("size", 0),
                          "browser_download_url": a.get("browser_download_url", ""),
                      }
                      for a in assets
                  ],
              })

          obj = {
              "repo": repo,
              "stars": stars,
              "forks": forks,
              "description": desc,
              "fetched_at": "",
              "releases": processed,
          }
          print(json.dumps(obj))
          PYEOF
          )

            if [ "$FIRST_REPO" = true ]; then
              OUTPUT="$OUTPUT$REPO_OBJ"
              FIRST_REPO=false
            else
              OUTPUT="$OUTPUT,$REPO_OBJ"
            fi
          done

          OUTPUT="$OUTPUT]"

          # Inject fetch timestamp
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          FINAL=$(python3 -c "
          import json, sys
          data = json.loads('''$OUTPUT'''.replace(\"\\\\'\", \"'\"))
          for r in data:
              r['fetched_at'] = '$TIMESTAMP'
          print(json.dumps(data, indent=2))
          ")

          echo "$FINAL" > releases.json
          echo "Done. Saved releases.json"

      - name: Commit and push releases.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add releases.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update releases data [$(date -u +'%Y-%m-%d %H:%M UTC')]"
          git push
