<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Turnip Tracker — Adreno Driver Releases</title>
  <meta name="description" content="Live download, star, and release tracker for Turnip (Adreno Mesa Vulkan) driver builds across GitHub repositories.">
  <meta property="og:title" content="Turnip Tracker — Adreno Driver Releases">
  <meta property="og:description" content="Live download, star, and release tracker for Turnip (Adreno Mesa Vulkan) driver builds across GitHub repositories.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="turnip.png">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Turnip Tracker — Adreno Driver Releases">
  <meta name="twitter:description" content="Live download, star, and release tracker for Turnip (Adreno Mesa Vulkan) driver builds across GitHub repositories.">
  <link rel="icon" type="image/png" href="turnip.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #1a1d24;
      --bg2:       #232936;
      --bg3:       #2d3344;
      --border:    #3a4451;
      --accent:    #00e5ff;
      --accent2:   #7c3aed;
      --green:     #22c55e;
      --yellow:    #facc15;
      --red:       #ef4444;
      --text:      #e2e8f0;
      --muted:     #a0aec0;
      --card-glow: 0 0 0 1px var(--border), 0 4px 32px rgba(0,229,255,0.04);
    }

    html[data-theme="light"] {
      --bg:        #f4f6f9;
      --bg2:       #ffffff;
      --bg3:       #eaedf2;
      --border:    #d7dce3;
      --accent:    #0091a8;
      --accent2:   #7c3aed;
      --green:     #16a34a;
      --yellow:    #b45309;
      --red:       #dc2626;
      --text:      #1a1d24;
      --muted:     #5b6573;
      --card-glow: 0 0 0 1px var(--border), 0 4px 24px rgba(0,0,0,0.04);
    }

    html[data-theme="light"] body::before { opacity: 0.25; }
    html[data-theme="light"] body::after {
      background-image:
        linear-gradient(rgba(0,0,0,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,0,0,0.025) 1px, transparent 1px);
    }
    html[data-theme="light"] .logo-icon { box-shadow: 0 0 16px rgba(0,145,168,0.25); }
    html[data-theme="light"] .tab.active { color: #fff; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── noise grain overlay ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.5;
    }

    /* ── grid line background ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── layout ── */
    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── header ── */
    header {
      padding: 52px 0 36px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 40px;
    }

    .logo-row {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 10px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,229,255,0.3);
    }

    h1 {
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 0.92rem;
      font-family: 'JetBrains Mono', monospace;
      margin-top: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 4px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      color: var(--muted);
    }

    .badge.live { border-color: var(--green); color: var(--green); }
    .badge.stale { border-color: var(--yellow); color: var(--yellow); }
    .badge.dead { border-color: var(--red); color: var(--red); }
    .badge.live::before, .badge.stale::before, .badge.dead::before {
      content: '';
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── tabs / sort ── */
    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .tab {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 7px 16px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
      font-weight: 700;
    }

    .search-box {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      padding: 7px 14px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text);
      margin-left: auto;
      min-width: 160px;
    }
    .search-box::placeholder { color: var(--muted); }
    .search-box:focus { outline: none; border-color: var(--accent); }

    .theme-toggle {
      font-size: 0.95rem;
      padding: 6px 12px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      line-height: 1;
    }
    .theme-toggle:hover { border-color: var(--accent); color: var(--accent); }

    /* ── summary cards ── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 18px 20px;
      box-shadow: var(--card-glow);
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--accent); }

    .stat-label {
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }

    .stat-sub {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      margin-top: 4px;
    }

    /* ── repo cards ── */
    .repo-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: var(--card-glow);
      transition: border-color 0.2s;
    }

    .repo-card:hover { border-color: rgba(0,229,255,0.3); }

    .repo-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 16px;
      cursor: pointer;
      user-select: none;
    }

    .repo-name {
      font-size: 1rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent);
    }

    .repo-name a {
      color: inherit;
      text-decoration: none;
    }
    .repo-name a:hover { text-decoration: underline; }

    .repo-desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 4px;
      line-height: 1.4;
      max-width: 640px;
    }

    .repo-stats {
      display: flex;
      gap: 14px;
      flex-shrink: 0;
      align-items: center;
    }

    .repo-stat {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 0.8rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
    }

    .repo-stat .num { color: var(--text); font-weight: 700; }

    .toggle-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 0.75rem;
      cursor: pointer;
      font-family: 'JetBrains Mono', monospace;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── releases table ── */
    .releases-body {
      border-top: 1px solid var(--border);
      display: none;
    }

    .releases-body.open { display: block; }

    .release-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }

    .release-row:last-child { border-bottom: none; }
    .release-row:hover { background: var(--bg3); }
    .release-row.clickable { cursor: pointer; }

    .release-row-wrap:last-child .release-row { border-bottom: none; }
    .release-row-wrap:has(.asset-list.open) .release-row { border-bottom: 1px solid var(--border); }

    .asset-list {
      display: none;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 4px 24px 10px 24px;
    }
    .asset-list.open { display: block; }

    .asset-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
      padding: 7px 0 7px 16px;
      font-size: 0.76rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      border-left: 2px solid var(--border);
    }

    .asset-name {
      color: var(--text);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .asset-size { white-space: nowrap; }
    .asset-dl { white-space: nowrap; color: var(--yellow); }

    .copy-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 5px;
      padding: 3px 9px;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }

    .sparkline { flex-shrink: 0; opacity: 0.85; }

    .release-name {
      font-size: 0.88rem;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
    }

    .release-name a {
      color: inherit;
      text-decoration: none;
    }
    .release-name a:hover { color: var(--accent); }

    .release-date {
      font-size: 0.72rem;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
      white-space: nowrap;
    }

    .dl-count {
      font-size: 0.82rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 700;
      color: var(--yellow);
      white-space: nowrap;
    }

    .dl-bar-wrap {
      width: 80px;
      height: 4px;
      background: var(--bg3);
      border-radius: 2px;
      overflow: hidden;
    }

    .dl-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      transition: width 0.6s ease;
    }

    .pre-badge {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(250,204,21,0.12);
      color: var(--yellow);
      border: 1px solid rgba(250,204,21,0.3);
      white-space: nowrap;
    }

    .stable-badge {
      font-size: 0.65rem;
      font-family: 'JetBrains Mono', monospace;
      padding: 2px 7px;
      border-radius: 4px;
      background: rgba(34,197,94,0.12);
      color: var(--green);
      border: 1px solid rgba(34,197,94,0.3);
      white-space: nowrap;
    }

    /* ── loading / error ── */
    .state-msg {
      text-align: center;
      padding: 80px 20px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .state-msg .big { font-size: 2.5rem; margin-bottom: 12px; }
    .state-msg .err { color: var(--red); }

    /* ── spinner ── */
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── footer ── */
    footer {
      border-top: 1px solid var(--border);
      margin-top: 60px;
      padding-top: 24px;
      font-size: 0.75rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }

    footer a {
      color: var(--muted);
      text-decoration: none;
    }
    footer a:hover {
      color: var(--accent);
      text-decoration: underline;
    }

    @media (max-width: 640px) {
      .release-row { grid-template-columns: 1fr auto; }
      .release-row .dl-bar-wrap,
      .release-row .release-date { display: none; }
      .repo-stats { display: none; }
      .asset-row { grid-template-columns: 1fr; gap: 4px; padding: 8px 0 8px 16px; }
    }
  </style>
</head>
<body>
<script>
  (function() {
    const saved = localStorage.getItem('turnip-theme');
    const theme = saved || (window.matchMedia && window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
    document.documentElement.setAttribute('data-theme', theme);
  })();
</script>
<div class="wrap">

  <!-- Header -->
  <header>
    <div class="logo-row">
      <div class="logo-icon">🫜</div>
      <h1>Turnip <span>Tracker</span></h1>
    </div>
    <p class="subtitle">// Adreno Mesa Vulkan driver release monitor</p>
    <div class="meta-row">
      <span class="badge live" id="live-badge">data current</span>
      <span class="badge" id="workflow-badge" style="display:none"></span>
      <span class="badge" id="fetch-time">—</span>
    </div>
  </header>

  <!-- Sort controls -->
  <div class="controls">
    <button class="tab" data-mode="downloads" onclick="setSort('downloads', event)">⬇️ Downloads</button>
    <button class="tab" data-mode="stars" onclick="setSort('stars', event)">⭐ Stars</button>
    <button class="tab" data-mode="recent" onclick="setSort('recent', event)">🕒 Recent</button>
    <input type="search" id="search-box" class="search-box" placeholder="filter repos…" oninput="setSearch(this.value)" aria-label="Filter repos">
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()" aria-label="Toggle light/dark theme" title="Toggle light/dark theme">🌙</button>
  </div>

  <!-- Summary stats -->
  <div class="summary-grid" id="summary-grid"></div>

  <!-- Repo list -->
  <div id="repo-list">
    <div class="state-msg">
      <div class="spinner"></div>
      Loading releases data…
    </div>
  </div>

  <footer>
    <span>Turnip Tracker — release &amp; download stats for tracked repos</span>
    <a href="https://github.com/skossan/turniptracker" target="_blank" rel="noopener">source on GitHub</a>
  </footer>
</div>

<script>
  syncThemeButton();

  let allData = [];
  const urlParams = new URLSearchParams(location.search);
  let sortMode = urlParams.get('sort') || localStorage.getItem('turnip-sort') || 'downloads';
  let searchQuery = (urlParams.get('q') || '').toLowerCase();

  function syncUrl() {
    const params = new URLSearchParams();
    if (sortMode !== 'downloads') params.set('sort', sortMode);
    if (searchQuery) params.set('q', searchQuery);
    const qs = params.toString();
    history.replaceState(null, '', qs ? `?${qs}` : location.pathname);
  }

  // ── helpers ────────────────────────────────────────────────
  function fmt(n) {
    if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
    if (n >= 1_000)     return (n / 1_000).toFixed(1)     + 'k';
    return String(n);
  }

  function relDate(iso) {
    const d = new Date(iso);
    const now = Date.now();
    const diff = now - d.getTime();
    const days = Math.floor(diff / 86400000);
    if (days === 0) return 'today';
    if (days === 1) return 'yesterday';
    if (days < 30)  return `${days}d ago`;
    if (days < 365) return `${Math.floor(days/30)}mo ago`;
    return `${Math.floor(days/365)}y ago`;
  }

  function shortDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });
  }

  function formatBytes(n) {
    if (!n) return '—';
    if (n >= 1_073_741_824) return (n / 1_073_741_824).toFixed(1) + ' GB';
    if (n >= 1_048_576)     return (n / 1_048_576).toFixed(1)     + ' MB';
    if (n >= 1024)          return (n / 1024).toFixed(1)          + ' KB';
    return n + ' B';
  }

  function renderSparkline(values) {
    const w = 70, h = 20, pad = 2;
    const max = Math.max(...values, 1);
    const min = Math.min(...values, 0);
    const range = max - min || 1;
    const stepX = (w - pad * 2) / (values.length - 1);
    const points = values.map((v, i) => {
      const x = pad + i * stepX;
      const y = h - pad - ((v - min) / range) * (h - pad * 2);
      return `${x.toFixed(1)},${y.toFixed(1)}`;
    }).join(' ');
    return `<svg class="sparkline" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" title="downloads per release trend">
      <polyline points="${points}" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>`;
  }

  function toggleAssets(rowEl) {
    const list = rowEl.nextElementSibling;
    if (!list || !list.classList.contains('asset-list')) return;
    const open = list.classList.toggle('open');
    rowEl.setAttribute('aria-expanded', open);
  }

  function copyAssetUrl(evt, btn) {
    evt.stopPropagation();
    const url = btn.dataset.url;
    navigator.clipboard.writeText(url).then(() => {
      const original = btn.textContent;
      btn.textContent = 'copied!';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = original; btn.classList.remove('copied'); }, 1500);
    });
  }

  function totalDownloads(repo) {
    return repo.releases.reduce((s, r) => s + r.total_downloads, 0);
  }

  function latestDate(repo) {
    const dates = repo.releases.map(r => new Date(r.published_at).getTime()).filter(Boolean);
    return dates.length ? Math.max(...dates) : 0;
  }

  // ── sort ───────────────────────────────────────────────────
  function setSort(mode, evt) {
    sortMode = mode;
    localStorage.setItem('turnip-sort', mode);
    syncUrl();
    syncTabs();
    render();
  }

  function toggleTheme() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    const next = isLight ? 'dark' : 'light';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('turnip-theme', next);
    syncThemeButton();
  }

  function syncThemeButton() {
    const isLight = document.documentElement.getAttribute('data-theme') === 'light';
    document.getElementById('theme-toggle').textContent = isLight ? '☀️' : '🌙';
  }

  function syncTabs() {
    document.querySelectorAll('.tab').forEach(t => {
      t.classList.toggle('active', t.dataset.mode === sortMode);
    });
  }

  function setSearch(value) {
    searchQuery = value.trim().toLowerCase();
    syncUrl();
    render();
  }

  function filtered(data) {
    if (!searchQuery) return data;
    return data.filter(r =>
      r.repo.toLowerCase().includes(searchQuery) ||
      (r.description || '').toLowerCase().includes(searchQuery)
    );
  }

  function sorted(data) {
    return [...filtered(data)].sort((a, b) => {
      if (sortMode === 'downloads') return totalDownloads(b) - totalDownloads(a);
      if (sortMode === 'stars')     return b.stars - a.stars;
      if (sortMode === 'recent')    return latestDate(b) - latestDate(a);
      return 0;
    });
  }

  // ── render ─────────────────────────────────────────────────
  function render() {
    const list = document.getElementById('repo-list');
    const data = sorted(allData);

    if (!data.length) {
      list.innerHTML = `<div class="state-msg"><div class="big">🔍</div>${searchQuery ? 'No repos match your filter.' : 'No data found.'}</div>`;
      return;
    }

    // max downloads for bar scaling
    const maxDl = Math.max(...data.flatMap(r => r.releases.map(x => x.total_downloads)), 1);

    list.innerHTML = data.map((repo, idx) => {
      const dlTotal = totalDownloads(repo);
      const latest  = repo.releases[0];
      const repoUrl = `https://github.com/${repo.repo}`;
      const openByDefault = idx === 0;

      const rows = repo.releases.map((r, rIdx) => {
        const pct = Math.round((r.total_downloads / maxDl) * 100);
        const assets = r.assets || [];
        const hasAssets = assets.length > 0;
        const assetRows = assets.map(a => `
          <div class="asset-row">
            <span class="asset-name" title="${escHtml(a.name)}">${escHtml(a.name)}</span>
            <span class="asset-size">${formatBytes(a.size)}</span>
            <span class="asset-dl">⬇️ ${fmt(a.download_count)}</span>
            <button class="copy-btn" data-url="${escHtml(a.browser_download_url)}" onclick="copyAssetUrl(event, this)">copy link</button>
          </div>`).join('');

        return `
          <div class="release-row-wrap">
            <div class="release-row ${hasAssets ? 'clickable' : ''}" ${hasAssets ? `onclick="toggleAssets(this)" role="button" tabindex="0" aria-expanded="false" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleAssets(this);}"` : ''}>
              <div>
                <div class="release-name"><a href="${r.html_url}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(r.name || r.tag_name)}</a></div>
                <div class="release-date">${shortDate(r.published_at)} · ${relDate(r.published_at)}</div>
              </div>
              <div class="dl-bar-wrap"><div class="dl-bar" style="width:${pct}%"></div></div>
              <div class="dl-count">⬇️ ${fmt(r.total_downloads)}</div>
              <div>${r.prerelease
                ? '<span class="pre-badge">pre-release</span>'
                : '<span class="stable-badge">stable</span>'}</div>
              <div class="release-date">${r.asset_count} asset${r.asset_count !== 1 ? 's' : ''}${hasAssets ? ' ▾' : ''}</div>
            </div>
            ${hasAssets ? `<div class="asset-list">${assetRows}</div>` : ''}
          </div>`;
      }).join('');

      const trend = repo.releases.slice(0, 12).reverse().map(r => r.total_downloads);
      const sparkline = trend.length > 1 ? renderSparkline(trend) : '';

      return `
        <div class="repo-card">
          <div class="repo-header" role="button" tabindex="0" aria-expanded="${openByDefault}" onclick="toggleCard(this)" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();toggleCard(this);}">
            <div>
              <div class="repo-name"><a href="${repoUrl}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${escHtml(repo.repo)}</a></div>
              ${repo.description ? `<div class="repo-desc">${escHtml(repo.description)}</div>` : ''}
              ${latest ? `<div class="release-date" style="margin-top:6px">Latest: <b style="color:var(--text)">${escHtml(latest.name||latest.tag_name)}</b> · ${relDate(latest.published_at)}</div>` : ''}
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:8px;flex-shrink:0">
              <div class="repo-stats">
                <span class="repo-stat">⭐ <span class="num">${fmt(repo.stars)}</span></span>
                <span class="repo-stat">🍴 <span class="num">${fmt(repo.forks)}</span></span>
                <span class="repo-stat">⬇️ <span class="num">${fmt(dlTotal)}</span></span>
                ${sparkline}
              </div>
              <button class="toggle-btn" tabindex="-1">${openByDefault ? 'collapse ▲' : 'expand ▼'}</button>
            </div>
          </div>
          <div class="releases-body ${openByDefault ? 'open' : ''}">
            ${rows || '<div style="padding:16px 24px;color:var(--muted);font-size:0.8rem;font-family:monospace">No releases found.</div>'}
          </div>
        </div>`;
    }).join('');
  }

  function toggleCard(header) {
    const body = header.nextElementSibling;
    const btn  = header.querySelector('.toggle-btn');
    const open = body.classList.toggle('open');
    header.setAttribute('aria-expanded', open);
    btn.textContent = open ? 'collapse ▲' : 'expand ▼';
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── summary stats ──────────────────────────────────────────
  function renderSummary() {
    const totalDl   = allData.reduce((s, r) => s + totalDownloads(r), 0);
    const totalRel  = allData.reduce((s, r) => s + r.releases.length, 0);
    const totalStars= allData.reduce((s, r) => s + r.stars, 0);
    const totalForks= allData.reduce((s, r) => s + r.forks, 0);
    const mostDl    = allData.reduce((best, r) => totalDownloads(r) > totalDownloads(best) ? r : best, allData[0]);

    document.getElementById('summary-grid').innerHTML = `
      <div class="stat-card">
        <div class="stat-label">Total Downloads</div>
        <div class="stat-value">${fmt(totalDl)}</div>
        <div class="stat-sub">across all tracked repos</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Releases Tracked</div>
        <div class="stat-value">${totalRel}</div>
        <div class="stat-sub">from ${allData.length} repositories</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Stars</div>
        <div class="stat-value">${fmt(totalStars)}</div>
        <div class="stat-sub">combined GitHub stars</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Total Forks</div>
        <div class="stat-value">${fmt(totalForks)}</div>
        <div class="stat-sub">combined GitHub forks</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Most Downloaded</div>
        <div class="stat-value" style="font-size:1rem;padding-top:4px">${mostDl ? escHtml(mostDl.repo.split('/')[1]) : '—'}</div>
        <div class="stat-sub">${mostDl ? fmt(totalDownloads(mostDl)) + ' downloads' : ''}</div>
      </div>
    `;
  }

  // ── workflow health badge ──────────────────────────────────
  async function checkWorkflowHealth() {
    const badge = document.getElementById('workflow-badge');
    try {
      const res = await fetch('https://api.github.com/repos/skossan/turniptracker/actions/workflows/fetch-releases.yml/runs?per_page=1');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const run = data.workflow_runs?.[0];
      if (!run) return;

      badge.classList.remove('live', 'stale', 'dead');
      badge.style.display = '';
      if (run.status !== 'completed') {
        badge.classList.add('stale');
        badge.textContent = 'fetch job running';
      } else if (run.conclusion === 'success') {
        badge.classList.add('live');
        badge.textContent = 'fetch job ok';
      } else {
        badge.classList.add('dead');
        badge.textContent = 'fetch job failing';
      }
    } catch (err) {
      // GitHub API may be rate-limited or unreachable; fail silently, badge stays hidden
    }
  }

  // ── load data ──────────────────────────────────────────────
  async function load() {
    try {
      const res = await fetch('releases.json?t=' + Date.now());
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      allData = await res.json();

      // update timestamp badge
      const fetchedAt = allData[0]?.fetched_at;
      if (fetchedAt) {
        document.getElementById('fetch-time').textContent = 'updated ' + relDate(fetchedAt);

        const ageHours = (Date.now() - new Date(fetchedAt).getTime()) / 3600000;
        const liveBadge = document.getElementById('live-badge');
        liveBadge.classList.remove('live', 'stale', 'dead');
        if (ageHours < 24) {
          liveBadge.classList.add('live');
          liveBadge.textContent = 'data current';
        } else if (ageHours < 72) {
          liveBadge.classList.add('stale');
          liveBadge.textContent = 'data stale';
        } else {
          liveBadge.classList.add('dead');
          liveBadge.textContent = 'data outdated';
        }
      }

      syncTabs();
      document.getElementById('search-box').value = searchQuery;
      renderSummary();
      render();
      checkWorkflowHealth();
    } catch (err) {
      document.getElementById('repo-list').innerHTML = `
        <div class="state-msg">
          <div class="big">⚠</div>
          <div class="err">Could not load <code>releases.json</code></div>
          <div style="margin-top:12px">${escHtml(err.message)}</div>
          <div style="margin-top:16px;font-size:0.78rem">
            Make sure the GitHub Actions workflow has run at least once<br>
            to generate <code>releases.json</code> in your repository root.
          </div>
        </div>`;
    }
  }

  load();
</script>
</body>
</html>
